<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCS — Ground Control Station</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1923;
      color: #e0e6ed;
      min-height: 100vh;
    }

   
    header {
      background: #1a2736;
      border-bottom: 1px solid #2a3a4e;
      padding: 0.6rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1rem;
      letter-spacing: 2px;
      color: #4fc3f7;
    }

    .conn-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
    }

    .conn-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #c62828;
      transition: background 0.3s;
    }

    .conn-dot.ok {
      background: #2e7d32;
    }

    .conn-dot.ws {
      background: #f9a825;
    }


    .dashboard {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr;
      gap: 1rem;
      padding: 1rem;
      max-width: 1400px;
      margin: 0 auto;
    }

   
    .stats-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
    }

    .stat-card {
      background: #1a2736;
      border: 1px solid #2a3a4e;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      text-align: center;
    }

    .stat-card .label {
      font-size: 0.65rem;
      color: #7a8fa6;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 4px;
      color: #e0e6ed;
    }

    .stat-card.warn .value {
      color: #f9a825;
    }

    .stat-card.danger .value {
      color: #ef5350;
    }

    /* ── Grid map ───────────────────────────────────────── */
    .map-panel {
      background: #1a2736;
      border: 1px solid #2a3a4e;
      border-radius: 8px;
      padding: 1rem;
    }

    .map-panel h2 {
      font-size: 0.75rem;
      color: #7a8fa6;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.75rem;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(21, 1fr);
      gap: 1px;
      aspect-ratio: 1;
      max-width: 100%;
    }

    .cell {
      aspect-ratio: 1;
      background: #223344;
      border-radius: 2px;
      transition: background 0.2s;
    }

    .cell.robot {
      background: #4fc3f7;
      border-radius: 50%;
      box-shadow: 0 0 6px #4fc3f7;
    }

    .cell.obstacle {
      background: #ef5350;
    }

    .cell.target {
      background: #66bb6a;
      border-radius: 50%;
    }

    .cell:hover {
      background: #2a4a5e;
      cursor: pointer;
    }

    
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel-box {
      background: #1a2736;
      border: 1px solid #2a3a4e;
      border-radius: 8px;
      padding: 1rem;
    }

    .panel-box h3 {
      font-size: 0.7rem;
      color: #7a8fa6;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.75rem;
    }


    .controls-grid {
      display: grid;
      grid-template-areas:
        ".  N  ."
        "W  R  E"
        ".  S  .";
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .controls-grid button {
      padding: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      border: 1px solid #3a5068;
      background: #223344;
      color: #e0e6ed;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .controls-grid button:hover {
      background: #2a4a5e;
      border-color: #4fc3f7;
    }

    .controls-grid button:active {
      background: #4fc3f7;
      color: #0f1923;
    }

    .controls-grid button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-n {
      grid-area: N;
    }

    .btn-s {
      grid-area: S;
    }

    .btn-e {
      grid-area: E;
    }

    .btn-w {
      grid-area: W;
    }

    .btn-reset {
      grid-area: R;
      font-size: 0.7rem !important;
      color: #ef5350 !important;
    }

  
    .action-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .action-row button {
      flex: 1;
      padding: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid #3a5068;
      background: #223344;
      color: #e0e6ed;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-row button:hover {
      background: #2a4a5e;
    }

  
    .sensor-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #1f2f3f;
      font-size: 0.8rem;
    }

    .sensor-row:last-child {
      border-bottom: none;
    }

    .sensor-label {
      color: #7a8fa6;
    }

    .sensor-value {
      font-weight: 600;
    }


    .log-box {
      background: #0f1923;
      border: 1px solid #2a3a4e;
      border-radius: 4px;
      padding: 8px;
      max-height: 160px;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.7rem;
      line-height: 1.5;
      color: #7a8fa6;
    }

    .log-entry.error {
      color: #ef5350;
    }

    .log-entry.info {
      color: #4fc3f7;
    }

    .log-entry.success {
      color: #66bb6a;
    }

   
    .battery-bar-bg {
      width: 100%;
      height: 6px;
      background: #223344;
      border-radius: 3px;
      margin-top: 6px;
      overflow: hidden;
    }

    .battery-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s, background 0.5s;
      background: #2e7d32;
    }

    .battery-bar-fill.warn {
      background: #f9a825;
    }

    .battery-bar-fill.danger {
      background: #ef5350;
    }

   
    @media (max-width: 900px) {
      .dashboard {
        grid-template-columns: 1fr;
      }

      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>⚙ GROUND CONTROL STATION</h1>
    <div class="conn-status">
      <div id="conn-dot" class="conn-dot"></div>
      <span id="conn-label">Connecting…</span>
    </div>
  </header>

  <div class="dashboard">

    
    <div class="stats-row">
      <div class="stat-card" id="card-pos">
        <div class="label">Position</div>
        <div class="value" id="pos">—</div>
      </div>
      <div class="stat-card" id="card-battery">
        <div class="label">Battery</div>
        <div class="value" id="battery">—</div>
        <div class="battery-bar-bg">
          <div class="battery-bar-fill" id="battery-bar" style="width:0%"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="label">Status</div>
        <div class="value" style="font-size:1rem" id="robot-status">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Robot ID</div>
        <div class="value" style="font-size:0.85rem" id="robot-id">—</div>
      </div>
    </div>

    
    <div class="map-panel">
      <h2>Map — 21×21 Grid</h2>
      <div class="grid-container" id="grid"></div>
    </div>

   
    <div class="side-panel">

      
      <div class="panel-box">
        <h3>Movement Controls</h3>
        <div class="controls-grid">
          <button class="btn-n" onclick="sendMove(0,-1)" title="Move North">▲ N</button>
          <button class="btn-w" onclick="sendMove(-1,0)" title="Move West">◄ W</button>
          <button class="btn-reset" onclick="resetRobot()" title="Reset">RST</button>
          <button class="btn-e" onclick="sendMove(1,0)" title="Move East">E ►</button>
          <button class="btn-s" onclick="sendMove(0,1)" title="Move South">▼ S</button>
        </div>
        <div class="action-row">
          <button onclick="fetchMap()">Refresh Map</button>
          <button onclick="fetchSensors()">Read Sensors</button>
        </div>
      </div>

      
      <div class="panel-box" id="sensor-panel">
        <h3>Sensor Readings</h3>
        <div id="sensor-data">
          <div class="sensor-row">
            <span class="sensor-label">No data yet</span>
          </div>
        </div>
      </div>

      
      <div class="panel-box">
        <h3>Activity Log</h3>
        <div class="log-box" id="log-box"></div>
      </div>

    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

   
    let currentPos = { x: 10, y: 10 };
    let targetPos = null;
    let isMoving = false;

  
    function initGrid() {
      const grid = $('grid');
      grid.innerHTML = '';
      for (let row = 0; row < 21; row++) {
        for (let col = 0; col < 21; col++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.x = col;
          cell.dataset.y = row;
          cell.addEventListener('click', () => clickCell(col, row));
          cell.title = `(${col}, ${row})`;
          grid.appendChild(cell);
        }
      }
    }

    function updateGrid(robotPos, obstacles = []) {
      const cells = document.querySelectorAll('.cell');
      cells.forEach(cell => {
        cell.classList.remove('robot', 'obstacle', 'target');
      });

      
      obstacles.forEach(obs => {
        const idx = obs.y * 21 + obs.x;
        if (cells[idx]) cells[idx].classList.add('obstacle');
      });

      
      if (targetPos) {
        const idx = targetPos.y * 21 + targetPos.x;
        if (cells[idx]) cells[idx].classList.add('target');
      }

      
      if (robotPos) {
        const idx = robotPos.y * 21 + robotPos.x;
        if (cells[idx]) cells[idx].classList.add('robot');
      }
    }

    function clickCell(x, y) {
      targetPos = { x, y };
      updateGrid(currentPos);
      addLog(`Target set: (${x}, ${y})`, 'info');
    }

   
    function addLog(msg, type = '') {
      const box = $('log-box');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${time}] ${msg}`;
      box.prepend(entry);
      
      while (box.children.length > 50) box.removeChild(box.lastChild);
    }

    
    async function fetchStatus() {
      try {
        const r = await fetch('/api/status');
        if (!r.ok) throw new Error(r.statusText);
        const d = await r.json();

        if (d.error) throw new Error(d.error);

        $('conn-dot').className = 'conn-dot ok';
        $('conn-label').textContent = 'Connected';

        $('robot-id').textContent = d.id ?? '—';
        $('robot-status').textContent = d.status ?? '—';

        if (d.position) {
          currentPos = d.position;
          $('pos').textContent = `(${d.position.x}, ${d.position.y})`;
        }

        if (d.battery !== undefined) {
          const batt = d.battery;
          $('battery').textContent = `${batt.toFixed(1)}%`;
          $('battery-bar').style.width = `${Math.max(0, Math.min(100, batt))}%`;

          const card = $('card-battery');
          const bar = $('battery-bar');
          card.className = 'stat-card' + (batt < 20 ? ' danger' : batt < 40 ? ' warn' : '');
          bar.className = 'battery-bar-fill' + (batt < 20 ? ' danger' : batt < 40 ? ' warn' : '');
        }
      } catch (e) {
        $('conn-dot').className = 'conn-dot';
        $('conn-label').textContent = 'Unreachable';
      }
    }

    async function sendMove(dx, dy) {
      if (isMoving) return;
      const newX = currentPos.x + dx;
      const newY = currentPos.y + dy;

      if (newX < 0 || newX > 20 || newY < 0 || newY > 20) {
        addLog(`Blocked: (${newX}, ${newY}) is out of bounds`, 'error');
        return;
      }

      isMoving = true;
      setControlsDisabled(true);
      addLog(`Moving to (${newX}, ${newY})…`, 'info');

      try {
        const r = await fetch('/api/move', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x: newX, y: newY })
        });
        const d = await r.json();

        if (d.error) {
          addLog(`Move failed: ${d.error}`, 'error');
        } else {
          addLog(`Moved to (${newX}, ${newY})`, 'success');
          await fetchStatus();
          await fetchMap();
        }
      } catch (e) {
        addLog(`Move error: ${e.message}`, 'error');
      } finally {
        isMoving = false;
        setControlsDisabled(false);
      }
    }

    async function resetRobot() {
      if (!confirm('Reset robot to starting position?')) return;
      addLog('Resetting robot…', 'info');
      try {
        const r = await fetch('/api/reset', { method: 'POST' });
        const d = await r.json();
        if (d.error) {
          addLog(`Reset failed: ${d.error}`, 'error');
        } else {
          addLog('Robot reset successfully', 'success');
          targetPos = null;
          await fetchStatus();
          await fetchMap();
        }
      } catch (e) {
        addLog(`Reset error: ${e.message}`, 'error');
      }
    }

    async function fetchMap() {
      try {
        const r = await fetch('/api/map');
        const d = await r.json();
        if (d.error) throw new Error(d.error);

        const obstacles = d.obstacles || [];
        const robotPos = d.robot || d.position || currentPos;
        updateGrid(robotPos, obstacles);
      } catch (e) {
      
        updateGrid(currentPos);
      }
    }

    async function fetchSensors() {
      try {
        const r = await fetch('/api/sensors');
        const d = await r.json();
        if (d.error) throw new Error(d.error);

        const container = $('sensor-data');
        container.innerHTML = '';

     
        function displayData(obj, prefix = '') {
          for (const [key, val] of Object.entries(obj)) {
            if (typeof val === 'object' && val !== null && !Array.isArray(val)) {
              displayData(val, `${prefix}${key}.`);
            } else {
              const row = document.createElement('div');
              row.className = 'sensor-row';
              const label = prefix + key;
              const displayVal = typeof val === 'number' ? val.toFixed(2) : String(val);
              row.innerHTML = `<span class="sensor-label">${label}</span><span class="sensor-value">${displayVal}</span>`;
              container.appendChild(row);
            }
          }
        }
        displayData(d);
        addLog('Sensors read successfully', 'success');
      } catch (e) {
        addLog(`Sensor error: ${e.message}`, 'error');
      }
    }

    function setControlsDisabled(disabled) {
      document.querySelectorAll('.controls-grid button').forEach(btn => {
        btn.disabled = disabled;
      });
    }

    
    let ws = null;
    let wsRetryCount = 0;

    function connectWebSocket() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}/ws/telemetry`;

      try {
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          wsRetryCount = 0;
          $('conn-dot').className = 'conn-dot ok';
          $('conn-label').textContent = 'Live (WebSocket)';
          addLog('WebSocket connected — live telemetry active', 'success');
        };

        ws.onmessage = (event) => {
          try {
            const d = JSON.parse(event.data);
            if (d.error) {
              $('conn-dot').className = 'conn-dot';
              $('conn-label').textContent = 'Robot unreachable';
              return;
            }

            $('conn-dot').className = 'conn-dot ok';
            $('conn-label').textContent = 'Live';

            if (d.position) {
              currentPos = d.position;
              $('pos').textContent = `(${d.position.x}, ${d.position.y})`;
              updateGrid(currentPos);
            }
            if (d.battery !== undefined) {
              const batt = d.battery;
              $('battery').textContent = `${batt.toFixed(1)}%`;
              $('battery-bar').style.width = `${Math.max(0, Math.min(100, batt))}%`;
              const card = $('card-battery');
              const bar = $('battery-bar');
              card.className = 'stat-card' + (batt < 20 ? ' danger' : batt < 40 ? ' warn' : '');
              bar.className = 'battery-bar-fill' + (batt < 20 ? ' danger' : batt < 40 ? ' warn' : '');
            }
            if (d.status) $('robot-status').textContent = d.status;
            if (d.id) $('robot-id').textContent = d.id;
          } catch (e) { /* ignore parse errors */ }
        };

        ws.onclose = () => {
          $('conn-dot').className = 'conn-dot ws';
          $('conn-label').textContent = 'Reconnecting…';
         
          const delay = Math.min(1000 * Math.pow(2, wsRetryCount), 30000);
          wsRetryCount++;
          setTimeout(connectWebSocket, delay);
        };

        ws.onerror = () => { ws.close(); };
      } catch (e) {
        
        addLog('WebSocket unavailable — using polling', 'info');
      }
    }

    
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      switch (e.key) {
        case 'ArrowUp': case 'w': case 'W': e.preventDefault(); sendMove(0, -1); break;
        case 'ArrowDown': case 's': case 'S': e.preventDefault(); sendMove(0, 1); break;
        case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); sendMove(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': e.preventDefault(); sendMove(1, 0); break;
        case 'r': case 'R': resetRobot(); break;
      }
    });

    
    initGrid();
    fetchStatus();
    fetchMap();
    connectWebSocket();

    
    setInterval(() => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        fetchStatus();
      }
    }, 3000);


    setInterval(fetchMap, 5000);

    addLog('Dashboard initialised', 'info');
  </script>

</body>

</html>
