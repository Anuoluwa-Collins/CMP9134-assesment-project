# CI — Build, Test & Push
name: CI — Build, Test & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # JOB 1 — Unit + integration tests
  # ════════════════════════════════════════════════════════════════════════
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Static Analysis (Linting)
        run: |
          pip install flake8
          flake8 ./backend --count --max-complexity=10 --show-source --statistics --extend-ignore=E501,W293,W291,E402

      - name: Run tests with coverage
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  # ════════════════════════════════════════════════════════════════════════
  # JOB 2 — Docker Compose integration test
  # ════════════════════════════════════════════════════════════════════════
  compose-test:
    name: Docker Compose integration
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env 2>/dev/null || true

      - name: Build and start all services
        run: docker compose up --build -d

      - name: Wait for backend health check
        run: |
          echo "Waiting for backend to be healthy…"
          for i in {1..20}; do
            if docker compose ps backend | grep -q "healthy"; then
              echo "Backend is healthy."
              break
            fi
            echo "Attempt $i/20 — waiting 5s…"
            sleep 5
          done

      - name: Smoke test — health endpoint
        run: |
          curl -sf http://localhost:8080/health \
          || (docker compose logs backend && exit 1)

      - name: Smoke test — status endpoint
        run: |
          curl -sf http://localhost:8080/api/status \
          || (docker compose logs backend && exit 1)

      - name: Print service status
        if: always()
        run: |
          docker compose ps
          echo "--- Backend logs (last 30 lines) ---"
          docker compose logs backend --tail 30

      - name: Tear down
        if: always()
        run: docker compose down -v
